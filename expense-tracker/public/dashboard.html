<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker — Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<!-- NAVBAR -->
<nav class="navbar">
    <h2>💰 Expense Tracker</h2>
    <div>
        <span id="nav-username"></span>
        <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
</nav>

<div class="container">

    <!-- SUMMARY CARDS -->
    <div class="summary-cards" id="summary-cards"></div>

    <div class="main-grid">

        <!-- ADD EXPENSE -->
        <div class="card">
            <h3>Add Expense</h3>
            <input type="text" id="title" placeholder="Title (e.g. Lunch)" />
            <input type="number" id="amount" placeholder="Amount (Rs.)" min="0" step="0.01"/>
            <select id="category">
                <option value="">Select Category</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Entertainment</option>
                <option>Health</option>
                <option>Education</option>
                <option>Other</option>
            </select>
            <input type="date" id="date" />
            <button class="btn-primary" onclick="addExpense()">Add Expense</button>
            <p id="add-message" class="message"></p>
        </div>

        <!-- FILTERS -->
        <div class="card">
            <h3>Filter Expenses</h3>
            <select id="filter-category">
                <option value="">All Categories</option>
                <option>Food</option>
                <option>Transport</option>
                <option>Shopping</option>
                <option>Entertainment</option>
                <option>Health</option>
                <option>Education</option>
                <option>Other</option>
            </select>
            <label>From</label>
            <input type="date" id="filter-from" />
            <label>To</label>
            <input type="date" id="filter-to" />
            <button class="btn-primary" onclick="loadExpenses()">Apply Filter</button>
            <button class="btn-secondary" onclick="clearFilters()">Clear</button>
        </div>

    </div>

    <!-- EXPENSES TABLE -->
    <div class="card">
        <h3>Your Expenses</h3>
        <div class="table-wrapper">
            <table id="expenses-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Category</th>
                        <th>Date</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="expenses-body">
                    <tr><td colspan="6" style="text-align:center;">Loading...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script>
    // Load username
    fetch('/me').then(r => r.json()).then(data => {
        document.getElementById('nav-username').textContent = 'Hi, ' + data.username;
    });

    // Set today's date as default
    document.getElementById('date').valueAsDate = new Date();

    // ── Load Expenses ──
    async function loadExpenses() {
        const category = document.getElementById('filter-category').value;
        const from = document.getElementById('filter-from').value;
        const to = document.getElementById('filter-to').value;

        let url = '/expenses?';
        if (category) url += `category=${category}&`;
        if (from) url += `from=${from}&`;
        if (to) url += `to=${to}&`;

        const res = await fetch(url);
        if (res.status === 401) return window.location.href = '/';
        const expenses = await res.json();

        const tbody = document.getElementById('expenses-body');
        if (expenses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No expenses found.</td></tr>';
            return;
        }

        tbody.innerHTML = expenses.map((e, i) => `
            <tr>
                <td>${i + 1}</td>
                <td>${e.title}</td>
                <td>Rs. ${parseFloat(e.amount).toFixed(2)}</td>
                <td><span class="badge badge-${e.category.toLowerCase()}">${e.category}</span></td>
                <td>${e.date.split('T')[0]}</td>
                <td><button class="btn-delete" onclick="deleteExpense(${e.id})">Delete</button></td>
            </tr>
        `).join('');

        loadSummary();
    }

    // ── Add Expense ──
    async function addExpense() {
        const title = document.getElementById('title').value.trim();
        const amount = document.getElementById('amount').value;
        const category = document.getElementById('category').value;
        const date = document.getElementById('date').value;
        const msgEl = document.getElementById('add-message');

        if (!title || !amount || !category || !date) {
            msgEl.textContent = 'Please fill all fields.';
            msgEl.className = 'message error';
            return;
        }

        const res = await fetch('/expenses', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ title, amount, category, date })
        });
        const data = await res.json();

        if (res.ok) {
            msgEl.textContent = 'Expense added!';
            msgEl.className = 'message success';
            document.getElementById('title').value = '';
            document.getElementById('amount').value = '';
            document.getElementById('category').value = '';
            loadExpenses();
        } else {
            msgEl.textContent = data.error;
            msgEl.className = 'message error';
        }
    }

    // ── Delete Expense ──
    async function deleteExpense(id) {
        if (!confirm('Delete this expense?')) return;
        await fetch(`/expenses/${id}`, { method: 'DELETE' });
        loadExpenses();
    }

    // ── Load Summary ──
    async function loadSummary() {
        const res = await fetch('/expenses/summary');
        const data = await res.json();

        const container = document.getElementById('summary-cards');
        container.innerHTML = `
            <div class="summary-card total">
                <p>Total Spent</p>
                <h2>Rs. ${data.grandTotal}</h2>
            </div>
            ${data.breakdown.map(b => `
                <div class="summary-card">
                    <p>${b.category}</p>
                    <h2>Rs. ${parseFloat(b.total).toFixed(2)}</h2>
                    <small>${b.count} expense${b.count > 1 ? 's' : ''}</small>
                </div>
            `).join('')}
        `;
    }

    // ── Clear Filters ──
    function clearFilters() {
        document.getElementById('filter-category').value = '';
        document.getElementById('filter-from').value = '';
        document.getElementById('filter-to').value = '';
        loadExpenses();
    }

    // ── Logout ──
    async function logout() {
        await fetch('/logout', { method: 'POST' });
        window.location.href = '/';
    }

    // Load on page open
    loadExpenses();
</script>
</body>
</html>
